{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/register.css' %}">

<form id="signform" method="post">
    {% csrf_token %}

    <h1>Sign up</h1>

    {{ form }}

    <input type="submit" value="Create" class="create">

    <div class="have_acc">
        <div class="login">
            Already have an account?
            <a href="{% url 'login' %}">login</a>
        </div>
    </div>



</form>

{% endblock %}
